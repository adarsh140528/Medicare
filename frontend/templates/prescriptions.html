<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prescriptions — MediVision AI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0d9488;--teal-dark:#0f766e;--teal-light:#5eead4;--cyan:#06b6d4;--slate-900:#0f172a;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;--slate-400:#94a3b8;--white:#fff;--amber:#f59e0b;--green:#22c55e;--sidebar-w:260px;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--slate-900);color:#fff;font-family:'DM Sans',sans-serif;display:flex;}
.sidebar{width:var(--sidebar-w);background:var(--slate-800);border-right:1px solid rgba(94,234,212,.1);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:50;}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(94,234,212,.1);display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-text{font-family:'Clash Display',sans-serif;font-size:18px;font-weight:700;}
.brand-text span{color:var(--teal-light);}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.nav-group-label{font-size:11px;font-weight:600;color:var(--slate-600);text-transform:uppercase;letter-spacing:1.5px;padding:8px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--slate-400);text-decoration:none;font-size:14px;transition:all .2s;margin-bottom:2px;}
.nav-item:hover,.nav-item.active{background:rgba(13,148,136,.15);color:#fff;}
.nav-item.active{color:var(--teal-light);}
.nav-icon{width:18px;text-align:center;font-size:16px;}
.main{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:auto;padding:32px;}
.page-title{font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;margin-bottom:6px;}
.page-sub{color:var(--slate-400);font-size:14px;margin-bottom:28px;}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:6px;}
.rx-grid{display:grid;gap:20px;}
.rx-card{background:var(--slate-800);border:1px solid rgba(94,234,212,.1);border-radius:16px;overflow:hidden;transition:all .3s;}
.rx-card:hover{border-color:rgba(13,148,136,.3);box-shadow:0 8px 30px rgba(0,0,0,.3);}
.rx-header{padding:20px 24px;background:rgba(13,148,136,.08);border-bottom:1px solid rgba(94,234,212,.08);display:flex;align-items:center;justify-content:space-between;}
.rx-id{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--teal-light);}
.rx-date{font-size:13px;color:var(--slate-400);}
.rx-body{padding:24px;}
.rx-doctor{font-size:16px;font-weight:600;margin-bottom:4px;}
.rx-diagnosis{font-size:14px;color:var(--teal-light);margin-bottom:20px;}
.medicine-table{width:100%;border-collapse:collapse;}
.medicine-table th{font-size:11px;font-weight:600;color:var(--slate-500);text-transform:uppercase;letter-spacing:1px;padding:8px 12px;text-align:left;border-bottom:1px solid rgba(94,234,212,.08);}
.medicine-table td{padding:12px;border-bottom:1px solid rgba(94,234,212,.05);font-size:14px;}
.medicine-table tr:last-child td{border-bottom:none;}
.medicine-table td:first-child{font-weight:600;color:var(--white);}
.medicine-table td{color:var(--slate-300);}
.notes-box{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:12px 16px;margin-top:16px;font-size:13px;color:#fcd34d;}
.notes-box::before{content:'📝 Notes: ';font-weight:600;}
.rx-footer{padding:16px 24px;background:rgba(15,23,42,.3);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.download-progress{display:none;font-size:13px;color:var(--teal-light);align-items:center;gap:8px;}
</style>
<script src="/static/theme.js"></script>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏥</div>
    <div class="brand-text">MediVision<span>AI</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group-label">Main</div>
    <a class="nav-item" href="/dashboard"><span class="nav-icon">📊</span>Dashboard</a>
    <a class="nav-item" href="/ai-predict"><span class="nav-icon">🧠</span>AI Predict</a>
    <a class="nav-item" href="/medibot"><span class="nav-icon">🤖</span>MediBot</a>
    <a class="nav-item" href="/vision"><span class="nav-icon">👁️</span>Vision AI</a>
    <div class="nav-group-label" style="margin-top:12px;">Healthcare</div>
    <a class="nav-item" href="/appointments"><span class="nav-icon">📅</span>Appointments</a>
    <a class="nav-item active" href="/prescriptions"><span class="nav-icon">💊</span>Prescriptions</a>
    <a class="nav-item" href="/health-report"><span class="nav-icon">📋</span>Health Report</a>
  </nav>
</div>

<div class="main">
  <div class="page-title">💊 Prescriptions</div>
  <div class="page-sub">View and download your medical prescriptions as PDF</div>

  <div class="rx-grid" id="rxList"></div>
</div>

<script>
const token = localStorage.getItem('medivision_token');
if (!token) { window.location.href = '/login'; }
const currentUser = JSON.parse(localStorage.getItem('medivision_user') || '{}');

// Removed DEMO_RX

// Loaded prescriptions (real or demo)
let allPrescriptions = [];

function renderPrescriptions(rxList) {
  document.getElementById('rxList').innerHTML = rxList.map(rx => `
    <div class="rx-card">
      <div class="rx-header">
        <div>
          <div class="rx-id">Rx ${rx.id}</div>
          <div class="rx-date">📅 ${rx.date} · Dr. ${rx.doctor_name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--teal-light);margin-bottom:4px">${rx.specialty}</div>
          <div style="font-size:11px;color:var(--slate-500)">Reg: ${rx.reg_no}</div>
        </div>
      </div>
      <div class="rx-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
          <div>
            <div class="rx-doctor">Dr. ${rx.doctor_name}</div>
            <div style="font-size:12px;color:var(--slate-500)">Specialist in ${rx.specialty}</div>
          </div>
          <div>
            <div style="font-size:13px;color:var(--slate-400)">Patient: <span style="color:#fff;font-weight:600">${rx.patient_name}</span></div>
            <div style="font-size:13px;color:var(--slate-400)">Age/Gender: <span style="color:#fff">${rx.age} yrs / ${rx.gender}</span></div>
          </div>
        </div>
        <div class="rx-diagnosis">🔬 Diagnosis: ${rx.diagnosis}</div>
        
        <table class="medicine-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Medicine</th>
              <th>Dosage</th>
              <th>Frequency</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody>
            ${rx.medicines.map((m,i) => `
              <tr>
                <td style="color:var(--teal-light);font-weight:700">${i+1}</td>
                <td>${m.name}</td>
                <td>${m.dosage}</td>
                <td>${m.frequency}</td>
                <td>${m.duration}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        
        <div class="notes-box">${rx.notes}</div>
        
        <div style="margin-top:12px;background:rgba(13,148,136,.06);border:1px solid rgba(13,148,136,.15);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--teal-light)">
          ⏰ Follow-up: ${rx.follow_up}
        </div>
      </div>
      <div class="rx-footer">
        <button class="btn btn-primary btn-sm" onclick="downloadPDF('${rx.id}')">
          <span id="dl-${rx.id}">📄 Download PDF</span>
        </button>
        <button class="btn btn-sm" style="background:rgba(30,41,59,.8);color:var(--slate-300);border:1px solid rgba(94,234,212,.1)">📤 Share</button>
        <button class="btn btn-sm" style="background:rgba(30,41,59,.8);color:var(--slate-300);border:1px solid rgba(94,234,212,.1)">🖨️ Print</button>
        <div class="download-progress" id="prog-${rx.id}"><div class="spinner"></div>Generating PDF...</div>
      </div>
    </div>
  `).join('');
}

async function downloadPDF(rxId) {
  const rx = allPrescriptions.find(r => r.id === rxId);
  if (!rx) return;
  const btn = document.getElementById(`dl-${rxId}`);
  const prog = document.getElementById(`prog-${rxId}`);

  btn.parentElement.disabled = true;
  btn.innerHTML = '⏳ Generating...';
  prog.style.display = 'flex';

  try {
    const res = await fetch('/api/prescriptions/generate-pdf', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        ...rx,
        patient_name: rx.patient_name || currentUser.full_name || 'Patient'
      })
    });

    if(res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `prescription_${rxId}.pdf`;
      a.click(); URL.revokeObjectURL(url);
    } else {
      alert('PDF generation failed. Opening print dialog...');
      window.print();
    }
  } catch {
    alert('PDF generation requires the server to be running with ReportLab installed.\n\nInstall: pip install reportlab\nThen restart the server.');
  }

  btn.innerHTML = '📄 Download PDF';
  btn.parentElement.disabled = false;
  prog.style.display = 'none';
}

async function loadPrescriptions() {
  try {
    const res = await fetch('/api/prescriptions/list', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.success && data.prescriptions && data.prescriptions.length > 0) {
      allPrescriptions = data.prescriptions;
      renderPrescriptions(allPrescriptions);
    } else {
      // No real prescriptions yet
      allPrescriptions = [];
      document.getElementById('rxList').innerHTML = '<div style="color:var(--slate-400);text-align:center;padding:40px">No prescriptions found.</div>';
    }
  } catch(e) {
    allPrescriptions = [];
    console.error("Failed to load prescriptions", e);
    document.getElementById('rxList').innerHTML = '<div style="color:var(--slate-400);text-align:center;padding:40px">No prescriptions found.</div>';
  }
}

window.onload = () => loadPrescriptions();
</script>
</body>
</html>
