<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard — MediVision AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-light: #5eead4;
      --cyan: #06b6d4;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-300: #cbd5e1;
      --red: #ef4444;
      --green: #10b981;
      --amber: #f59e0b;
      --purple: #8b5cf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--slate-900);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 256px;
      background: var(--slate-800);
      border-right: 1px solid rgba(94, 234, 212, .08);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 50;
    }

    .logo-wrap {
      padding: 20px 18px;
      font-family: 'Clash Display', sans-serif;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(94, 234, 212, .08);
      flex-shrink: 0;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--teal);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-menu {
      flex: 1;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      color: var(--slate-400);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      font-size: 14px;
      transition: all .2s;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: rgba(15, 23, 42, .5);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(13, 148, 136, .12);
      color: var(--teal-light);
      border-color: rgba(13, 148, 136, .2);
    }

    .nav-icon {
      font-size: 17px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-bottom {
      padding: 14px 10px;
      border-top: 1px solid rgba(94, 234, 212, .08);
    }

    .doc-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      margin-bottom: 6px;
    }

    .doc-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .doc-name {
      font-size: 13px;
      font-weight: 600;
    }

    .doc-role {
      font-size: 11px;
      color: var(--teal-light);
      margin-top: 1px;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 13px;
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .15);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, .18);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      margin-left: 256px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
      border-bottom: 1px solid rgba(94, 234, 212, .08);
      background: rgba(15, 23, 42, .85);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 40;
      flex-shrink: 0;
    }

    .page-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .22);
      border-radius: 100px;
      padding: 5px 13px;
      font-size: 12px;
      color: #6ee7b7;
      font-weight: 600;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    /* ── CONTENT ── */
    .content {
      padding: 22px 26px;
      flex: 1;
      overflow-y: auto;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── STAT STRIP ── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--slate-800);
      border: 1px solid rgba(94, 234, 212, .1);
      border-radius: 14px;
      padding: 18px 20px;
    }

    .stat-num {
      font-family: 'Clash Display', sans-serif;
      font-size: 30px;
      font-weight: 700;
    }

    .stat-lbl {
      font-size: 12px;
      color: var(--slate-400);
      margin-top: 4px;
    }

    /* ── APPOINTMENT CARDS ── */
    .apts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 15px;
    }

    .apt-card {
      background: var(--slate-800);
      border: 1px solid rgba(94, 234, 212, .09);
      border-radius: 16px;
      padding: 18px 20px;
      transition: all .25s;
    }

    .apt-card:hover {
      border-color: rgba(13, 148, 136, .28);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(13, 148, 136, .08);
    }

    .apt-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 13px;
    }

    .apt-patient {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .apt-av {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .apt-pname {
      font-size: 14px;
      font-weight: 700;
    }

    .apt-pid {
      font-size: 11px;
      color: var(--slate-500);
      margin-top: 2px;
      letter-spacing: .3px;
    }

    .apt-badge-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .bdg {
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .4px;
    }

    .bdg-ok {
      background: rgba(16, 185, 129, .12);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, .22);
    }

    .bdg-warn {
      background: rgba(245, 158, 11, .12);
      color: #fcd34d;
      border: 1px solid rgba(245, 158, 11, .22);
    }

    .bdg-paid {
      background: rgba(13, 148, 136, .12);
      color: var(--teal-light);
      border: 1px solid rgba(13, 148, 136, .22);
    }

    .bdg-unpaid {
      background: rgba(239, 68, 68, .12);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, .22);
    }

    .apt-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 12px;
    }

    .apt-meta-cell {
      background: rgba(15, 23, 42, .55);
      border-radius: 8px;
      padding: 8px 11px;
    }

    .amc-lbl {
      font-size: 10px;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 2px;
    }

    .amc-val {
      font-size: 12px;
      font-weight: 600;
    }

    .apt-reason-box {
      background: rgba(15, 23, 42, .45);
      border-radius: 8px;
      padding: 8px 11px;
      margin-bottom: 13px;
      font-size: 12px;
      color: var(--slate-300);
      line-height: 1.55;
    }

    .apt-reason-box b {
      color: var(--slate-500);
      font-weight: 500;
    }

    .apt-btns {
      display: flex;
      gap: 7px;
    }

    .abt {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .abt-green {
      background: var(--teal);
      color: #fff;
    }

    .abt-green:hover {
      background: var(--teal-dark);
    }

    .abt-gray {
      background: var(--slate-700);
      color: #fff;
    }

    .abt-gray:hover {
      background: var(--slate-600);
    }

    .abt:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    /* ── EMPTY ── */
    .empty-wrap {
      text-align: center;
      padding: 70px 20px;
      color: var(--slate-400);
    }

    .empty-icon {
      font-size: 54px;
      margin-bottom: 14px;
    }

    .empty-wrap p {
      font-size: 14px;
      line-height: 1.8;
    }

    /* ── PRESCRIPTION FORM ── */
    .rx-wrap {
      max-width: 820px;
    }

    .rx-card {
      background: var(--slate-800);
      border: 1px solid rgba(94, 234, 212, .09);
      border-radius: 16px;
      padding: 26px 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--slate-400);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: rgba(15, 23, 42, .75);
      border: 1.5px solid rgba(94, 234, 212, .11);
      border-radius: 9px;
      padding: 11px 13px;
      color: #fff;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--teal);
    }

    .field select option {
      background: var(--slate-800);
    }

    .meds-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--teal-light);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(94, 234, 212, .08);
    }

    .med-col-hd {
      display: grid;
      grid-template-columns: 2.2fr 1fr 1fr 1fr 40px;
      gap: 9px;
      margin-bottom: 7px;
      padding: 0 2px;
    }

    .med-col-hd span {
      font-size: 10px;
      font-weight: 700;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .med-row {
      display: grid;
      grid-template-columns: 2.2fr 1fr 1fr 1fr 40px;
      gap: 9px;
      margin-bottom: 9px;
      align-items: center;
    }

    .med-row input {
      background: rgba(15, 23, 42, .75);
      border: 1.5px solid rgba(94, 234, 212, .11);
      border-radius: 8px;
      padding: 9px 11px;
      color: #fff;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }

    .med-row input:focus {
      border-color: var(--teal);
    }

    .btn-del {
      width: 40px;
      height: 38px;
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .18);
      color: #fca5a5;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .btn-del:hover {
      background: rgba(239, 68, 68, .22);
    }

    .btn-add-med {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--slate-700);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      margin-top: 8px;
    }

    .btn-add-med:hover {
      background: var(--slate-600);
    }

    .btn-send {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      background: var(--teal);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s;
      margin-top: 22px;
    }

    .btn-send:hover {
      background: var(--teal-dark);
      transform: translateY(-1px);
    }

    .btn-sm-refresh {
      padding: 7px 13px;
      background: var(--slate-700);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }

    .btn-sm-refresh:hover {
      background: var(--slate-600);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 22px;
      padding: 13px 20px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
      transform: translateY(110px);
      opacity: 0;
      transition: all .3s cubic-bezier(.68, -.55, .265, 1.55);
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(94, 234, 212, .15);
      border-radius: 3px;
    }
  </style>
  <script src="/static/theme.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo-wrap">
      <div class="logo-icon">🏥</div>
      MediVision<span style="color:var(--teal-light)">AI</span>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" id="nav-apts" onclick="switchTab('apts')">
        <span class="nav-icon">🗓️</span> Appointments
      </div>
      <div class="nav-item" id="nav-rx" onclick="switchTab('rx')">
        <span class="nav-icon">✍️</span> Prescriptions
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="doc-info">
        <div class="doc-avatar" id="docInitials">DR</div>
        <div>
          <div class="doc-name" id="docName">Loading...</div>
          <div class="doc-role">⚕️ Physician</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Manage Appointments</div>
      <div class="topbar-right">
        <div class="live-pill">
          <div class="live-dot"></div> Live Portal
        </div>
        <button class="btn-sm-refresh" onclick="loadAppointments()">🔄 Refresh</button>
      </div>
    </div>

    <div class="content">

      <!-- APPOINTMENTS PANEL -->
      <div class="panel active" id="panel-apts">
        <div class="stat-strip">
          <div class="stat-box">
            <div class="stat-num" id="statTotal">—</div>
            <div class="stat-lbl">Total Appointments</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" style="color:#6ee7b7" id="statConfirmed">—</div>
            <div class="stat-lbl">Confirmed</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" style="color:var(--amber)" id="statPending">—</div>
            <div class="stat-lbl">Pending</div>
          </div>
        </div>
        <div class="apts-grid" id="aptsGrid">
          <div style="color:var(--slate-400);font-size:14px;padding:20px 0;">Loading appointments...</div>
        </div>
      </div>

      <!-- PRESCRIPTIONS PANEL -->
      <div class="panel" id="panel-rx">
        <div class="rx-wrap">
          <div class="rx-card">
            <div class="field">
              <label>Select Patient / Appointment</label>
              <select id="rxPatientSelect" onchange="fillRxDetails()">
                <option value="">— Choose an appointment —</option>
              </select>
            </div>

            <input type="hidden" id="rxPatientId">
            <input type="hidden" id="rxApptId">

            <div class="field">
              <label>Diagnosis</label>
              <input type="text" id="rxDiagnosis" placeholder="e.g. Viral Fever, Hypertension">
            </div>

            <div style="margin:20px 0 14px">
              <div class="meds-title">💊 Medicines</div>
              <div class="med-col-hd">
                <span>Medicine Name</span>
                <span>Dosage</span>
                <span>Frequency</span>
                <span>Duration</span>
                <span></span>
              </div>
              <div id="medicinesContainer">
                <div class="med-row">
                  <input type="text" class="m-name" placeholder="Paracetamol 500mg">
                  <input type="text" class="m-dose" placeholder="1 tablet">
                  <input type="text" class="m-freq" placeholder="1-0-1">
                  <input type="text" class="m-dur" placeholder="5 days">
                  <button class="btn-del" onclick="this.parentElement.remove()" title="Remove">✕</button>
                </div>
              </div>
              <button class="btn-add-med" onclick="addMedRow()">+ Add Medicine</button>
            </div>

            <div class="field">
              <label>Doctor's Notes</label>
              <textarea id="rxNotes" rows="3" placeholder="Rest well, drink plenty of fluids..."></textarea>
            </div>

            <div class="field">
              <label>Follow-up Date (Optional)</label>
              <input type="date" id="rxFollowUp">
            </div>

            <button class="btn-send" onclick="submitPrescription()">📤 Send Prescription to Patient</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentUser = null;
    let allAppointments = [];

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('medivision_token');
      if (!token) { window.location.href = '/login'; return; }
      try {
        currentUser = JSON.parse(localStorage.getItem('medivision_user') || '{}');
        if (currentUser.role !== 'doctor') { window.location.href = '/dashboard'; return; }
        const name = currentUser.full_name || 'Doctor';
        document.getElementById('docName').textContent = name;
        document.getElementById('docInitials').textContent = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        loadAppointments();
      } catch (e) { window.location.href = '/login'; }
    });

    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(e => e.classList.remove('active'));
      document.getElementById('nav-' + tabId).classList.add('active');
      document.getElementById('panel-' + tabId).classList.add('active');
      const titles = { apts: 'Manage Appointments', rx: 'Issue Prescription' };
      document.getElementById('pageTitle').textContent = titles[tabId] || tabId;
    }

    function showToast(msg, isErr = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isErr ? 'var(--red)' : 'var(--teal)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function loadAppointments() {
      const token = localStorage.getItem('medivision_token');
      try {
        const res = await fetch('/api/appointments/doctor-list', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.success) {
          allAppointments = data.appointments;
          renderAppointments();
          populatePatientSelect();
        }
      } catch (e) { showToast('Failed to load appointments', true); }
    }

    function renderAppointments() {
      const grid = document.getElementById('aptsGrid');
      const total = allAppointments.length;
      const confirmed = allAppointments.filter(a => a.status === 'confirmed').length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statConfirmed').textContent = confirmed;
      document.getElementById('statPending').textContent = total - confirmed;

      if (total === 0) {
        grid.innerHTML = `<div class="empty-wrap"><div class="empty-icon">📭</div><p>No appointments yet.<br>They will appear here once patients book with you.</p></div>`;
        return;
      }

      grid.innerHTML = allAppointments.map(a => {
        const initials = (a.patient_name || 'PT').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const shortId = (a.patient_id || '').substring(0, 8).toUpperCase();
        const isPaid = a.payment_status === 'paid';
        const isConfirmed = a.status === 'confirmed';
        return `
    <div class="apt-card">
      <div class="apt-head">
        <div class="apt-patient">
          <div class="apt-av">${initials}</div>
          <div>
            <div class="apt-pname">${a.patient_name || 'Patient'}</div>
            <div class="apt-pid">ID: ${shortId}</div>
          </div>
        </div>
        <div class="apt-badge-col">
          <span class="bdg ${isConfirmed ? 'bdg-ok' : 'bdg-warn'}">${(a.status || 'PENDING').toUpperCase()}</span>
          <span class="bdg ${isPaid ? 'bdg-paid' : 'bdg-unpaid'}">${isPaid ? '✓ PAID' : '✗ UNPAID'} ₹${a.payment_amount || 0}</span>
        </div>
      </div>
      <div class="apt-meta">
        <div class="apt-meta-cell">
          <div class="amc-lbl">Date</div>
          <div class="amc-val">📅 ${a.appointment_date || '—'}</div>
        </div>
        <div class="apt-meta-cell">
          <div class="amc-lbl">Time</div>
          <div class="amc-val">⏰ ${(a.appointment_time || '—').slice(0, 5)}</div>
        </div>
      </div>
      <div class="apt-reason-box"><b>Reason:</b> ${a.reason || 'Not specified'}</div>
      <div class="apt-btns">
        ${!isConfirmed
            ? `<button class="abt abt-green" onclick="acceptApt('${a.id}')">✓ Accept</button>`
            : `<button class="abt abt-gray" disabled>✓ Confirmed</button>`}
        ${!isPaid
            ? `<button class="abt abt-gray" onclick="markPaid('${a.id}')">💳 Mark Paid</button>`
            : `<button class="abt abt-gray" disabled style="color:var(--teal-light)">✓ Paid</button>`}
      </div>
    </div>`;
      }).join('');
    }

    async function acceptApt(id) {
      const token = localStorage.getItem('medivision_token');
      try {
        const res = await fetch('/api/appointments/accept/' + id, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.success) { showToast('✅ Appointment confirmed!'); loadAppointments(); }
        else showToast(data.error || 'Error', true);
      } catch (e) { showToast('Connection error', true); }
    }

    async function markPaid(id) {
      const token = localStorage.getItem('medivision_token');
      try {
        const res = await fetch('/api/appointments/mark-paid/' + id, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.success) { showToast('💳 Marked as paid!'); loadAppointments(); }
        else showToast(data.error || 'Error', true);
      } catch (e) { showToast('Connection error', true); }
    }

    function populatePatientSelect() {
      const sel = document.getElementById('rxPatientSelect');
      sel.innerHTML = '<option value="">— Choose an appointment —</option>';
      allAppointments.forEach(a => {
        const name = a.patient_name || 'Patient #' + (a.patient_id || '').substring(0, 6).toUpperCase();
        sel.innerHTML += `<option value="${a.id}" data-pid="${a.patient_id}">${name} — ${a.appointment_date}</option>`;
      });
    }

    function fillRxDetails() {
      const sel = document.getElementById('rxPatientSelect');
      const opt = sel.options[sel.selectedIndex];
      if (opt && opt.value) {
        document.getElementById('rxApptId').value = opt.value;
        document.getElementById('rxPatientId').value = opt.getAttribute('data-pid');
      } else {
        document.getElementById('rxApptId').value = '';
        document.getElementById('rxPatientId').value = '';
      }
    }

    function addMedRow() {
      const cont = document.getElementById('medicinesContainer');
      const row = document.createElement('div');
      row.className = 'med-row';
      row.innerHTML = `
    <input type="text" class="m-name" placeholder="Medicine Name">
    <input type="text" class="m-dose" placeholder="Dosage">
    <input type="text" class="m-freq" placeholder="Frequency">
    <input type="text" class="m-dur" placeholder="Duration">
    <button class="btn-del" onclick="this.parentElement.remove()" title="Remove">✕</button>
  `;
      cont.appendChild(row);
    }

    async function submitPrescription() {
      const patient_id = document.getElementById('rxPatientId').value;
      const appointment_id = document.getElementById('rxApptId').value;
      if (!patient_id) return showToast('Please select a patient', true);

      const meds = [];
      document.querySelectorAll('.med-row').forEach(row => {
        const name = row.querySelector('.m-name').value.trim();
        if (name) meds.push({
          name,
          dosage: row.querySelector('.m-dose').value.trim() || '—',
          frequency: row.querySelector('.m-freq').value.trim() || '—',
          duration: row.querySelector('.m-dur').value.trim() || '—'
        });
      });
      if (meds.length === 0) return showToast('Add at least one medicine', true);

      const payload = {
        patient_id, appointment_id,
        diagnosis: document.getElementById('rxDiagnosis').value,
        notes: document.getElementById('rxNotes').value,
        follow_up_date: document.getElementById('rxFollowUp').value || null,
        medicines: meds
      };

      const token = localStorage.getItem('medivision_token');
      try {
        const res = await fetch('/api/prescriptions/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          showToast('📤 Prescription sent!');
          ['rxDiagnosis', 'rxNotes', 'rxFollowUp'].forEach(id => document.getElementById(id).value = '');
          document.getElementById('rxPatientSelect').value = '';
          fillRxDetails();
          document.getElementById('medicinesContainer').innerHTML = '';
          addMedRow();
        } else { showToast(data.error || 'Failed', true); }
      } catch (e) { showToast('Connection error', true); }
    }

    function logout() { localStorage.clear(); window.location.href = '/login'; }
  </script>
</body>

</html>
